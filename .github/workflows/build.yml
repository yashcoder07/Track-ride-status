name: Build Android App

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manually running the action on GitHub

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.3.1

      - name: Restore Debug Keystore
        run: |
          echo "Current working directory: $(pwd)"
          if [ -f debug.keystore.base64 ]; then
            echo "debug.keystore.base64 found. Attempting to decode..."
            base64 -d debug.keystore.base64 > debug.keystore || base64 --decode debug.keystore.base64 > debug.keystore || openssl base64 -d -in debug.keystore.base64 -out debug.keystore || true
          fi
          
          if [ -f debug.keystore ]; then
            echo "debug.keystore restored successfully from base64!"
            ls -lh debug.keystore
          else
            echo "Keystore file could not be decoded or is missing, generating standard debug keystore as fallback..."
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Configure local environment properties
        run: |
          cp .env.example .env || true
          echo "sdk.dir=${ANDROID_HOME}" > local.properties

      - name: Build Debug APK with Gradle
        run: gradle assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bike-rent-tracker-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Create or Update GitHub Release
        if: github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="v1.0.${{ github.run_number }}"
          echo "Creating Release $TAG_NAME..."
          gh release create "$TAG_NAME" \
            app/build/outputs/apk/debug/app-debug.apk \
            --title "Build v1.0.${{ github.run_number }}" \
            --notes "Automated compiled debug APK for commit ${{ github.sha }}." \
            --generate-notes || true
