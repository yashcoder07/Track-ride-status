name: Build Android App

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manually running the action on GitHub

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.3.1

      - name: Restore Debug Keystore
        run: |
          if [ -f debug.keystore.base64 ]; then
            echo "Restoring debug signing keystore..."
            base64 -d debug.keystore.base64 > debug.keystore
          else
            echo "No base64 keystore found, letting Gradle auto-generate active debug keys."
          fi

      - name: Configure local environment properties
        run: |
          cp .env.example .env || true
          echo "sdk.dir=${ANDROID_HOME}" > local.properties

      - name: Build Debug APK with Gradle
        run: gradle assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bike-rent-tracker-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
